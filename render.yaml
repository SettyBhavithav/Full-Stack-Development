services:
  - type: web
    name: devverse-node-api
    env: node
    rootDir: devverse-ai/backend
    buildCommand: "npm install"
    startCommand: "node server.js"
    envVars:
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: "production"
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        value: "replace-with-planetscale-or-aiven-host"
      - key: DB_USER
        value: "replace-with-db-user"
      - key: DB_PASSWORD
        value: "replace-with-db-password"
      - key: DB_NAME
        value: "devverse"
      - key: REDIS_URL
        value: "replace-with-upstash-redis-url"
      - key: PYTHON_API_URL
        value: "replace-with-python-render-url"

  - type: web
    name: devverse-python-api
    env: python
    rootDir: devverse-ai/python-services
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_sm"
    startCommand: "gunicorn -w 1 -b 0.0.0.0:$PORT app:app"
    envVars:
      - key: PORT
        value: "5001"
      - key: FLASK_ENV
        value: "production"

  - type: worker
    name: devverse-worker
    env: node
    rootDir: devverse-ai/workers
    buildCommand: "npm install"
    startCommand: "node queue_worker.js"
    envVars:
      - key: REDIS_URL
        value: "replace-with-upstash-redis-url"
      - key: DB_HOST
        value: "replace-with-planetscale-or-aiven-host"
      - key: DB_USER
        value: "replace-with-db-user"
      - key: DB_PASSWORD
        value: "replace-with-db-password"
      - key: DB_NAME
        value: "devverse"
